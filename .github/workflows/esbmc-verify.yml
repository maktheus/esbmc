name: ESBMC Continuous Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  formal-verification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pibic/requirements.txt
        
    - name: Install ESBMC Binary (Mocked from latest release)
      run: |
        wget https://github.com/esbmc/esbmc/releases/download/v8.0.0/esbmc-linux.zip
        unzip esbmc-linux.zip -d bin/
        export PATH=$PATH:$(pwd)/bin/
        
    - name: Run Pytest Comprehensive Formal Verification Suite
      run: |
        cd pibic
        pytest tests/ -v
